<section class="wallet-card">
  <h3>BTC Wallet</h3>

  @if (btcWalletService.account(); as account) {
    <div class="wallet-card__content">
      <div class="wallet-card__info">
        <span class="wallet-card__label">Connected address</span>
        <span class="wallet-card__value wallet-card__mono">
          {{ account.address }}
        </span>
      </div>

      <button
        class="wallet-card__button wallet-card__button--secondary"
        type="button"
        (click)="onDisconnect()"
      >
        Disconnect
      </button>
    </div>
  } @else {
    <button
      class="wallet-card__button"
      type="button"
      [disabled]="btcWalletService.isConnecting()"
      (click)="onConnect()"
    >
      {{ btcWalletService.isConnecting() ? 'Connecting...' : 'Connect BTC wallet' }}
    </button>
  }

  @if (errorMessage(); as errorMessage) {
    <p class="wallet-card__error">{{ errorMessage }}</p>
  }
</section>
